name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 패키지 설치
      run: |
        pip install -r requirements.txt

    - name: EXE 빌드
      run: |
        pyinstaller --onefile main.py

    - name: 결과 업로드
      uses: actions/upload-artifact@v4
      with:
        name: vacuum-exe
        path: dist/main.exe
